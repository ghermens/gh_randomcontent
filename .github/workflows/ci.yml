name: Tests

on: [pull_request, workflow_dispatch]

jobs:
  cgl:
    name: Coding Guidelines

    runs-on: ubuntu-latest

    steps:
      - name: 'Checkout'
        uses: actions/checkout@v6

      - name: 'Lint PHP'
        run: Build/Scripts/runTests.sh -p 8.2 -s lint

      - name: 'Composer validate'
        run: Build/Scripts/runTests.sh -p 8.2 -s composerValidate

      - name: 'Composer normalize'
        run: Build/Scripts/runTests.sh -p 8.2 -s composerNormalize -n

      - name: 'CGL'
        run: Build/Scripts/runTests.sh -p 8.2 -s cgl -n

  testing:
    name: Testing

    runs-on: ubuntu-latest

    strategy:
      fail-fast: true

      matrix:
        php:
          - '8.2'
          - '8.3'
          - '8.4'
          - '8.5'

    steps:
      - name: 'Checkout'
        uses: actions/checkout@v6

      - name: 'Lint PHP'
        run: Build/Scripts/runTests.sh -p ${{ matrix.php }} -s lint

      - name: 'Install testing system'
        run: Build/Scripts/runTests.sh -p ${{ matrix.php }} -s composerUpdate

      - name: 'phpstan'
        run: Build/Scripts/runTests.sh -p ${{ matrix.php }} -s phpstan

      - name: 'Execute unit tests'
        run: Build/Scripts/runTests.sh -p ${{ matrix.php }} -s unit
